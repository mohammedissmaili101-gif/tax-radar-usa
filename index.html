<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>TaxRadar | Best 2026 Freelance Tax Calculator (CA, NY, TX, FL)</title>
    <meta name="description" content="Calculate your 2026 take-home pay instantly. The most accurate freelance tax calculator for California, New York, Texas, and Florida. 100% Private.">
    <meta name="keywords" content="freelance tax calculator 2026, California self employment tax, New York net pay calculator, Texas freelance taxes, tax radar">
    
    <meta property="og:title" content="TaxRadar: Instant Freelance Tax Insight">
    <meta property="og:description" content="Stop guessing your taxes. Get your accurate net pay in 5 seconds.">
    <meta property="og:type" content="website">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TaxRadar",
      "operatingSystem": "All",
      "applicationCategory": "FinanceApplication",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Professional-grade freelance tax calculator for US contractors."
    }
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #050505;
            --card: #0f0f0f;
            --accent: #39FF14;
            --text: #ffffff;
            --muted: #a0a0a0;
            --border: #222;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .hero { text-align: center; margin-bottom: 40px; }
        .hero h1 { font-size: 48px; font-weight: 800; letter-spacing: -2px; margin: 0; color: var(--accent); }
        .hero p { color: var(--muted); font-size: 18px; margin-top: 10px; }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .app-container::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px; background: linear-gradient(90deg, transparent, var(--accent), transparent);
        }

        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }
        
        .input-wrapper { position: relative; }
        .input-wrapper span { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--muted); font-weight: bold; }
        
        input, select {
            width: 100%; background: #1a1a1a; border: 1px solid var(--border); padding: 15px 15px 15px 35px; border-radius: 12px;
            color: white; font-size: 18px; font-family: 'JetBrains Mono', monospace; transition: all 0.3s; box-sizing: border-box;
        }

        select { padding-left: 15px; cursor: pointer; }
        input:focus { border-color: var(--accent); background: #222; outline: none; box-shadow: 0 0 15px rgba(57, 255, 20, 0.1); }

        button {
            width: 100%; background: var(--accent); color: black; border: none; padding: 18px; border-radius: 12px;
            font-weight: 800; font-size: 16px; cursor: pointer; transition: transform 0.2s, background 0.3s; text-transform: uppercase;
        }

        button:hover { background: #32e612; transform: translateY(-2px); }

        .results-box {
            margin-top: 35px; padding-top: 30px; border-top: 1px dashed var(--border); display: none;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .res-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .res-label { color: var(--muted); font-size: 14px; }
        .res-value { font-family: 'JetBrains Mono', monospace; font-weight: 600; font-size: 20px; }
        .res-value.highlight { color: var(--accent); font-size: 32px; font-weight: 800; }

        .trust-badges {
            margin-top: 40px; display: flex; gap: 20px; justify-content: center; opacity: 0.5; filter: grayscale(1);
        }

        footer { margin-top: 50px; text-align: center; color: #444; font-size: 12px; max-width: 600px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>TaxRadar<span style="color:white">.io</span></h1>
        <p>The smartest way to forecast your 2026 earnings.</p>
    </div>

    <div class="app-container">
        <div class="input-group">
            <label>Annual Gross Income</label>
            <div class="input-wrapper">
                <span>$</span>
                <input type="number" id="income" placeholder="120,000" oninput="liveCalc()">
            </div>
        </div>

        <div class="input-group">
            <label>Filing State</label>
            <select id="state" onchange="liveCalc()">
                <option value="california">California (High Tax/High Opportunity)</option>
                <option value="newyork">New York (Financial Hub)</option>
                <option value="texas">Texas (0% State Income Tax)</option>
                <option value="florida">Florida (The Sunshine State - 0% Tax)</option>
            </select>
        </div>

        <button onclick="calculate()">Get Full Breakdown</button>

        <div class="results-box" id="results">
            <div class="res-row">
                <span class="res-label">Net Take-Home Pay</span>
                <span class="res-value highlight" id="takeHome">$0</span>
            </div>
            <div class="res-row">
                <span class="res-label">Monthly Pocket</span>
                <span class="res-value" id="monthlyNet">$0</span>
            </div>
            <div class="res-row">
                <span class="res-label">Estimated Taxes (Fed + State + FICA)</span>
                <span class="res-value" id="totalTax" style="color: #ff4d4d;">$0</span>
            </div>
        </div>
    </div>

    <footer>
        <p>Designed for Digital Nomads & High-Earning Freelancers. Powered by Focushive Analytics Engine. 
        Privacy First: No data ever leaves your browser.</p>
    </footer>

    <script>
        function calculate() {
            const results = document.getElementById('results');
            results.style.display = 'block';
            liveCalc();
        }

        function liveCalc() {
            const income = parseFloat(document.getElementById('income').value) || 0;
            const state = document.getElementById('state').value;

            const rates = {
                california: 0.093,
                newyork: 0.065,
                texas: 0.00,
                florida: 0.00
            };

            // 2026 Estimates
            const ficaRate = 0.153; 
            const fedRate = 0.22;
            const deduction = 14600;

            const taxableFed = Math.max(0, income - deduction);
            const fedTax = taxableFed * fedRate;
            const ficaTax = income * ficaRate;
            const stateTax = income * rates[state];

            const totalTax = fedTax + ficaTax + stateTax;
            const netPay = Math.max(0, income - totalTax);

            document.getElementById('takeHome').innerText = '$' + netPay.toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('monthlyNet').innerText = '$' + (netPay/12).toLocaleString(undefined, {maximumFractionDigits: 0});
            document.getElementById('totalTax').innerText = '$' + totalTax.toLocaleString(undefined, {maximumFractionDigits: 0});
        }
    </script>
</body>
</html>
