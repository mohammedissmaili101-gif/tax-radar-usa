<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="pek_oHFsRrtgR_Y6ti-HMARB3N1V5Zg0nqj-YD_eIKc" />
    <title>TaxRadar | Best 2026 Freelance Tax Calculator (CA, NY, TX, FL)</title>
    <meta name="description" content="Calculate your 2026 take-home pay instantly. Accurate freelance tax calculator for US contractors. 100% Private.">
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2215%22 fill=%22%23050505%22/><text y=%22.9em%22 x=%2250%22 font-size=%2280%22 font-weight=%22900%22 text-anchor=%22middle%22 fill=%22%2339FF14%22>T</text></svg>">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #050505; --card: #0f0f0f; --accent: #39FF14; --text: #ffffff; --muted: #a0a0a0; --border: #222; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 40px; }
        .logo-box { width: 50px; height: 50px; background: var(--accent); color: black; font-weight: 900; font-size: 30px; display: flex; align-items: center; justify-content: center; border-radius: 12px; margin: 0 auto 15px; }
        .hero h1 { font-size: 40px; font-weight: 800; letter-spacing: -1.5px; margin: 0; color: var(--text); }
        .hero h1 span { color: var(--accent); }
        .app-container { width: 100%; max-width: 480px; background: var(--card); padding: 35px; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.8); position: relative; }
        .input-group { margin-bottom: 22px; }
        label { display: block; font-size: 11px; font-weight: 600; color: var(--muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; }
        input, select { width: 100%; background: #1a1a1a; border: 1px solid var(--border); padding: 14px; border-radius: 10px; color: white; font-size: 16px; font-family: 'JetBrains Mono', monospace; box-sizing: border-box; }
        button { width: 100%; background: var(--accent); color: black; border: none; padding: 16px; border-radius: 10px; font-weight: 800; font-size: 15px; cursor: pointer; transition: 0.2s; text-transform: uppercase; margin-bottom: 10px; }
        .btn-share { background: transparent; border: 1px solid var(--accent); color: var(--accent); margin-top: 10px; display: none; }
        .results-box { margin-top: 30px; padding-top: 25px; border-top: 1px dashed var(--border); display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .res-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .res-value.highlight { color: var(--accent); font-size: 28px; font-weight: 800; }
        footer { margin-top: 40px; text-align: center; }
        .footer-links { margin-bottom: 15px; }
        .footer-links a { color: var(--muted); text-decoration: none; font-size: 12px; margin: 0 10px; transition: 0.3s; }
        .footer-links a:hover { color: var(--accent); }
        .copy { font-size: 11px; color: #444; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="logo-box">T</div>
        <h1>TaxRadar<span>.io</span></h1>
        <p style="color:var(--muted)">Accurate 2026 Freelance Tax Forecasting</p>
    </div>

    <div class="app-container">
        <div class="input-group">
            <label>Annual Gross Income ($)</label>
            <input type="number" id="income" placeholder="100,000" oninput="liveCalc()">
        </div>
        <div class="input-group">
            <label>State</label>
            <select id="state" onchange="liveCalc()">
                <option value="california">California</option>
                <option value="newyork">New York</option>
                <option value="texas">Texas (0% State Tax)</option>
                <option value="florida">Florida (0% State Tax)</option>
            </select>
        </div>
        <button onclick="calculate()">Calculate Net Pay</button>
        
        <div class="results-box" id="results">
            <div class="res-row"><span style="color:var(--muted)">Net Take-Home</span><span class="res-value highlight" id="takeHome">$0</span></div>
            <div class="res-row"><span style="color:var(--muted)">Monthly Pay</span><span class="res-value" id="monthlyNet">$0</span></div>
            <div class="res-row"><span style="color:var(--muted)">Total Taxes</span><span class="res-value" id="totalTax" style="color:#ff4d4d">$0</span></div>
            <button class="btn-share" id="shareBtn" onclick="shareResults()">Share Calculation</button>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="about.html">About</a>
            <a href="privacy.html">Privacy</a>
            <a href="terms.html">Terms</a>
            <a href="contact.html">Contact</a>
        </div>
        <p class="copy">© 2026 TaxRadar. Powered by Focushive.</p>
    </footer>

    <script>
        function calculate() {
            document.getElementById('results').style.display = 'block';
            document.getElementById('shareBtn').style.display = 'block';
            liveCalc();
        }
        function liveCalc() {
            const income = parseFloat(document.getElementById('income').value) || 0;
            const state = document.getElementById('state').value;
            const rates = { california: 0.093, newyork: 0.065, texas: 0, florida: 0 };
            const fed = 0.22, fica = 0.153, ded = 14600;
            const taxFed = Math.max(0, (income - ded) * fed);
            const taxState = income * rates[state];
            const taxFica = income * fica;
            const total = taxFed + taxState + taxFica;
            const net = Math.max(0, income - total);
            document.getElementById('takeHome').innerText = '$' + net.toLocaleString();
            document.getElementById('monthlyNet').innerText = '$' + Math.round(net/12).toLocaleString();
            document.getElementById('totalTax').innerText = '$' + total.toLocaleString();
        }
        function shareResults() {
            const text = `My estimated net pay is ${document.getElementById('takeHome').innerText} on TaxRadar.io!`;
            if (navigator.share) {
                navigator.share({ title: 'TaxRadar Calculation', text: text, url: window.location.href });
            } else {
                alert("Copied to clipboard: " + text);
            }
        }
    </script>
</body>
</html>
