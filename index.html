<!DOCTYPE html>
<html lang="en">
<head>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-VC0Y3B8ZF0"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-VC0Y3B8ZF0');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google-site-verification" content="pek_oHFsRrtgR_Y6ti-HMARB3N1V5Zg0nqj-YD_eIKc" />
    
    <title id="dynamicTitle">TaxRadar | #1 US Freelance Tax Calculator 2026</title>
    <meta name="description" id="dynamicDesc" content="Calculate your 2026 net pay and taxes in any US state. Precision tax forecasting by Focushive Intelligence.">
    
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/calculator.png">
    <link rel="shortcut icon" href="https://img.icons8.com/fluency/48/calculator.png">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono&display=swap" rel="stylesheet">

    <style>
        :root { --bg: #050505; --card: #0f0f0f; --accent: #39FF14; --text: #ffffff; --muted: #a0a0a0; --border: #222; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 40px 20px; }
        .hero { text-align: center; margin-bottom: 40px; }
        .logo-box { width: 55px; height: 55px; background: var(--accent); color: black; font-weight: 900; font-size: 32px; display: flex; align-items: center; justify-content: center; border-radius: 14px; margin: 0 auto 15px; box-shadow: 0 0 20px rgba(57, 255, 20, 0.4); }
        .hero h1 { font-size: 44px; font-weight: 800; letter-spacing: -1.5px; margin: 0; }
        .hero h1 span { color: var(--accent); }
        .app-container { width: 100%; max-width: 500px; background: var(--card); padding: 35px; border-radius: 28px; border: 1px solid var(--border); box-shadow: 0 25px 60px rgba(0,0,0,0.9); }
        .input-group { margin-bottom: 25px; }
        label { display: block; font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1.2px; }
        input, select { width: 100%; background: #161616; border: 1px solid var(--border); padding: 16px; border-radius: 12px; color: white; font-size: 16px; box-sizing: border-box; }
        button { width: 100%; background: var(--accent); color: black; border: none; padding: 18px; border-radius: 12px; font-weight: 800; cursor: pointer; transition: 0.2s; }
        .results-box { margin-top: 35px; padding-top: 30px; border-top: 1px dashed var(--border); display: none; }
        .res-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .state-grid { margin-top: 50px; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; width: 100%; max-width: 900px; border-top: 1px solid #111; padding-top: 30px; }
        .state-grid a { color: #444; text-decoration: none; font-size: 11px; transition: 0.2s; }
        .state-grid a:hover { color: var(--accent); }
        footer { margin-top: 60px; text-align: center; color: #333; font-size: 12px; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="logo-box">T</div>
        <h1>TaxRadar<span>.io</span></h1>
        <p id="heroSub" style="color:var(--muted); font-weight: 600;">The Elite Tax Forecast Engine</p>
    </div>

    <div class="app-container">
        <div class="input-group">
            <label>Estimated 2026 Gross Income ($)</label>
            <input type="number" id="income" placeholder="e.g. 120,000" oninput="liveCalc()">
        </div>
        <div class="input-group">
            <label>Business Location (State)</label>
            <select id="state" onchange="updateSEO()">
                <option value="alabama">Alabama</option><option value="alaska">Alaska</option><option value="arizona">Arizona</option><option value="arkansas">Arkansas</option><option value="california">California</option><option value="colorado">Colorado</option><option value="connecticut">Connecticut</option><option value="delaware">Delaware</option><option value="florida">Florida</option><option value="georgia">Georgia</option><option value="hawaii">Hawaii</option><option value="idaho">Idaho</option><option value="illinois">Illinois</option><option value="indiana">Indiana</option><option value="iowa">Iowa</option><option value="kansas">Kansas</option><option value="kentucky">Kentucky</option><option value="louisiana">Louisiana</option><option value="maine">Maine</option><option value="maryland">Maryland</option><option value="massachusetts">Massachusetts</option><option value="michigan">Michigan</option><option value="minnesota">Minnesota</option><option value="mississippi">Mississippi</option><option value="missouri">Missouri</option><option value="montana">Montana</option><option value="nebraska">Nebraska</option><option value="nevada">Nevada</option><option value="new-hampshire">New Hampshire</option><option value="new-jersey">New Jersey</option><option value="new-mexico">New Mexico</option><option value="new-york">New York</option><option value="north-carolina">North Carolina</option><option value="north-dakota">North Dakota</option><option value="ohio">Ohio</option><option value="oklahoma">Oklahoma</option><option value="oregon">Oregon</option><option value="pennsylvania">Pennsylvania</option><option value="rhode-island">Rhode Island</option><option value="south-carolina">South Carolina</option><option value="south-dakota">South Dakota</option><option value="tennessee">Tennessee</option><option value="texas">Texas</option><option value="utah">Utah</option><option value="vermont">Vermont</option><option value="virginia">Virginia</option><option value="washington">Washington</option><option value="west-virginia">West Virginia</option><option value="wisconsin">Wisconsin</option><option value="wyoming">Wyoming</option>
            </select>
        </div>
        <button onclick="calculate()">Calculate Net Income</button>
        <div class="results-box" id="results">
            <div class="res-row"><span>Take-Home</span><span id="takeHome" style="color:var(--accent); font-weight:800;"></span></div>
        </div>
    </div>

    <div class="state-grid" id="stateLinks"></div>

    <footer>Powered by Focushive Intelligence</footer>

    <script>
        const rates = { alabama:0.05, alaska:0, arizona:0.025, arkansas:0.044, california:0.093, colorado:0.044, connecticut:0.05, delaware:0, florida:0, georgia:0.0549, hawaii:0.0825, idaho:0.058, illinois:0.0495, indiana:0.0315, iowa:0.057, kansas:0.057, kentucky:0.05, louisiana:0.0425, maine:0.058, maryland:0.0475, massachusetts:0.05, michigan:0.0425, minnesota:0.0535, mississippi:0.05, missouri:0.0495, montana:0, nebraska:0.0584, nevada:0, "new-hampshire":0, "new-jersey":0.055, "new-mexico":0.049, "new-york":0.065, "north-carolina":0.045, "north-dakota":0.011, ohio:0.0275, oklahoma:0.0475, oregon:0.0675, pennsylvania:0.0307, "rhode-island":0.0375, "south-carolina":0.03, "south-dakota":0, tennessee:0, texas:0, utah:0.0485, vermont:0.0335, virginia:0.0575, washington:0, "west-virginia":0.0512, wisconsin:0.053, wyoming:0 };

        function updateSEO() {
            const state = document.getElementById('state').value;
            const stateLabel = document.querySelector(`#state option[value="${state}"]`).innerText;
            document.title = `Tax Calculator ${stateLabel} | 2026 Forecast`;
            document.getElementById('dynamicDesc').setAttribute("content", `Master your ${stateLabel} freelance taxes with TaxRadar.`);
            document.getElementById('heroSub').innerText = `Elite Tax Forecasting for ${stateLabel}`;
        }

        window.onload = function() {
            const grid = document.getElementById('stateLinks');
            Object.keys(rates).forEach(s => {
                const a = document.createElement('a');
                const name = s.charAt(0).toUpperCase() + s.slice(1).replace("-", " ");
                a.href = `?state=${name.replace(" ", "-")}`;
                a.innerText = name;
                grid.appendChild(a);
            });

            const params = new URLSearchParams(window.location.search);
            const st = params.get('state');
            if (st) {
                const clean = st.toLowerCase().replace("-", " ");
                const option = Array.from(document.querySelectorAll('#state option')).find(o => o.innerText.toLowerCase() === clean);
                if (option) { 
                    document.getElementById('state').value = option.value; 
                    updateSEO(); 
                }
            }
        };
        function calculate() { document.getElementById('results').style.display='block'; liveCalc(); }
        function liveCalc() {
            const income = parseFloat(document.getElementById('income').value) || 0;
            const state = document.getElementById('state').value;
            const stateRate = rates[state] || 0;
            const federalRate = 0.15; // تقديري فقط
            const totalTax = income * (stateRate + federalRate);
            const net = income - totalTax;
            document.getElementById('takeHome').innerText = '$' + net.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }
    </script>
</body>
</html>
